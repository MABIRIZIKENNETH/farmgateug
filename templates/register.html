<!DOCTYPE html>
<html lang="{{ lang(request) }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('Register · FarmGate.ug') }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .role-btn.active { background: #0a3322; color: white; border-color: #0a3322; }
        .location-select { width:100%; padding:0.5rem 1rem; border-radius:9999px; border:1px solid #d1d5db; background:white; }
        .location-select:focus { outline:none; border-color:#5a9e42; box-shadow:0 0 0 2px rgba(90,158,66,0.2); }
        .lang-select { background: #0a3322; color: white; border: 1px solid #5a9e42; border-radius: 9999px; padding: 0.25rem 0.75rem; font-size: 0.875rem; }
        .lang-select:focus { outline: none; border-color: #a8d68c; }
    </style>
</head>
<body class="bg-[#f0f8ec]">
    <nav class="bg-[#0a3322] text-white p-4 flex flex-wrap justify-between border-b-4 border-[#5a9e42]">
        <span class="text-xl font-bold"><span class="text-red-500">Farm</span>Gate<span class="text-[#a8d68c]">.ug</span></span>
        <div class="flex gap-4 items-center">
            <a href="/login" class="hover:text-[#a8d68c]">{{ _('Login') }}</a>
            <a href="/" class="hover:text-[#a8d68c]">{{ _('Home') }}</a>
            <select onchange="window.location='/set-language/'+this.value" class="lang-select">
                <option value="en" {% if lang(request) == 'en' %}selected{% endif %}>English</option>
                <option value="lg" {% if lang(request) == 'lg' %}selected{% endif %}>Luganda</option>
            </select>
        </div>
    </nav>
    <section class="max-w-2xl mx-auto p-6 bg-white rounded-3xl shadow mt-8 border border-[#b8db9e] mb-8">
        <h2 class="text-2xl font-bold text-[#0a3322]"><i class="fas fa-user-plus text-[#5a9e42]"></i> {{ _('Register') }}</h2>
        <form id="registerForm" class="mt-4 space-y-3">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <input type="text" id="full_name" name="full_name" placeholder="{{ _('Full Name') }}" required class="w-full border rounded-full px-4 py-2">
                <input type="tel" id="phone" name="phone" placeholder="{{ _('WhatsApp Number (+256...)') }}" required class="w-full border rounded-full px-4 py-2">
            </div>
            <input type="email" id="email" name="email" placeholder="{{ _('Email (optional)') }}" class="w-full border rounded-full px-4 py-2">
            <div class="relative">
                <input type="password" id="password" name="password" placeholder="{{ _('Password (min 6 chars)') }}" required minlength="6" class="w-full border rounded-full px-4 py-2 pr-10">
                <i class="fas fa-eye absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 cursor-pointer" id="toggleRegPassword"></i>
            </div>
            <div class="flex gap-4 mt-2">
                <button type="button" class="role-btn active flex-1 py-2 border-2 border-[#0a3322] rounded-full" data-role="farmer" onclick="selectRole('farmer')"><i class="fas fa-tractor"></i> {{ _('Farmer') }}</button>
                <button type="button" class="role-btn flex-1 py-2 border-2 border-gray-300 rounded-full" data-role="buyer" onclick="selectRole('buyer')"><i class="fas fa-building"></i> {{ _('Buyer/Facility') }}</button>
            </div>
            <input type="hidden" id="role" name="role" value="farmer">
            <div id="farmerFields">
                <select id="district" name="district" class="location-select">
                    <option value="">{{ _('Select District') }}</option>
                    {% for d in districts %}
                    <option value="{{ d }}">{{ d }}</option>
                    {% endfor %}
                </select>
                <input type="text" id="village" name="village" placeholder="{{ _('Village (type manually)') }}" class="w-full border rounded-full px-4 py-2 mt-2">
                <select id="sector_id" name="sector_id" class="location-select mt-2">
                    <option value="">{{ _('Agricultural Sector') }}</option>
                    {% for s in sectors %}
                    <option value="{{ s.id }}" data-category="{{ s.category }}">{{ s.name }} ({{ s.category }})</option>
                    {% endfor %}
                </select>
            </div>
            <div id="buyerFields" style="display:none;">
                <select id="country" name="country" class="location-select">
                    <option value="">{{ _('Select Country') }}</option>
                    {% for c in countries %}
                    <option value="{{ c }}">{{ c }}</option>
                    {% endfor %}
                </select>
                <input type="text" id="company" name="company" placeholder="{{ _('Company / Organization') }}" class="w-full border rounded-full px-4 py-2 mt-2">
                <select id="buyer_sector" name="buyer_sector" class="location-select mt-2">
                    <option value="">{{ _('Sector of Interest') }}</option>
                    <option value="crops">Crops</option>
                    <option value="livestock">Livestock</option>
                    <option value="poultry">Poultry</option>
                    <option value="fish">Fish</option>
                    <option value="dairy">Dairy</option>
                    <option value="horticulture">Horticulture</option>
                    <option value="agro-processing">Agro-processing</option>
                    <option value="all">All</option>
                </select>
            </div>
            <button type="submit" class="bg-[#0a3322] text-white px-6 py-2 rounded-full hover:bg-[#1a5535] w-full"><i class="fas fa-user-plus"></i> {{ _('Register') }}</button>
        </form>
        <div id="registerAlert" class="mt-2 hidden"></div>
        <p class="text-center mt-4 text-sm">{{ _('Already have an account?') }} <a href="/login" class="text-[#5a9e42] font-semibold">{{ _('Login') }}</a></p>
    </section>
    <script>
        function selectRole(r){
            document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));
            document.querySelector(`.role-btn[data-role="${r}"]`).classList.add('active');
            document.getElementById('role').value = r;
            document.getElementById('farmerFields').style.display = (r === 'farmer') ? 'block' : 'none';
            document.getElementById('buyerFields').style.display = (r === 'buyer') ? 'block' : 'none';
        }

        document.getElementById('toggleRegPassword').addEventListener('click', function(){
            var i = document.getElementById('password');
            if (i.type === 'password') {
                i.type = 'text';
                this.classList.remove('fa-eye');
                this.classList.add('fa-eye-slash');
            } else {
                i.type = 'password';
                this.classList.remove('fa-eye-slash');
                this.classList.add('fa-eye');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var alert = document.getElementById('registerAlert');
            alert.classList.add('hidden');

            var role = document.getElementById('role').value;
            var data = {
                full_name: document.getElementById('full_name').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                email: document.getElementById('email').value.trim() || null,
                password: document.getElementById('password').value,
                role: role
            };

            if (role === 'farmer') {
                data.district = document.getElementById('district').value;
                data.village = document.getElementById('village').value.trim();
                data.sector_id = parseInt(document.getElementById('sector_id').value) || null;
                if (!data.district || !data.village) {
                    alert.className = 'mt-2 p-2 rounded-full bg-red-100 text-red-800';
                    alert.textContent = 'Please select district and enter village';
                    alert.classList.remove('hidden');
                    return;
                }
            } else {
                data.country = document.getElementById('country').value;
                data.company = document.getElementById('company').value.trim() || null;
                data.buyer_sector = document.getElementById('buyer_sector').value;
                if (!data.country) {
                    alert.className = 'mt-2 p-2 rounded-full bg-red-100 text-red-800';
                    alert.textContent = 'Please select country';
                    alert.classList.remove('hidden');
                    return;
                }
            }

            try {
                var res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                var result = await res.json();
                if (res.ok) {
                    alert.className = 'mt-2 p-2 rounded-full bg-green-100 text-green-800';
                    alert.textContent = '✅ ' + result.message;
                    alert.classList.remove('hidden');
                    if (result.message.includes('awaiting admin approval')) {
                        setTimeout(() => { window.location.href = '/login'; }, 3000);
                    } else {
                        setTimeout(() => { window.location.href = '/login'; }, 2000);
                    }
                } else {
                    alert.className = 'mt-2 p-2 rounded-full bg-red-100 text-red-800';
                    alert.textContent = '❌ ' + (result.detail || 'Registration failed');
                    alert.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                alert.className = 'mt-2 p-2 rounded-full bg-red-100 text-red-800';
                alert.textContent = '❌ Network error: ' + err.message;
                alert.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
